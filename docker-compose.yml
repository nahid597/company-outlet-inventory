services:
  postgres:
    image: postgres:16-alpine
    container_name: ms-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: management_system
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ms-api
    env_file:
      - ./api/.env.example
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      TS_NODE_DEV_POLL: "true"
    ports:
      - "4000:4000"
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    depends_on:
      - postgres
    command: npm run dev

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ms-web
    env_file:
      - ./web/.env.example
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    ports:
      - "5173:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    command: npm run dev -- --host

volumes:
  postgres_data:
  api_node_modules:
  web_node_modules:
